<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding and viewport settings for proper rendering -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page title -->
    <title>lily ♡</title>
    
    <!-- Import Quicksand font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Import Lucide icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Link to our stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main container for the entire page -->
    <div class="container">
        <!-- Profile section containing image and bio -->
        <div class="profile">
            <!-- Profile image with pink border -->
            <img 
                src="https://files.catbox.moe/1gq6tt.jpg"
                alt="Profile"
                class="profile-image"
            >
            
            <!-- Name and bio text -->
            <h1>lily</h1>
            <p class="bio">♡ she/her ♡ 21 ♡ artist & developer</p>
            
            <!-- Social links section -->
            <div class="links">
                <!-- GitHub link -->
                <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="link-card">
                    <span class="link-content">
                        <i data-lucide="github"></i>
                        <span>Github</span>
                    </span>
                    <i data-lucide="external-link" class="external-link"></i>
                </a>

                <!-- Twitter link -->
                <a href="https://twitter.com" target="_blank" rel="noopener noreferrer" class="link-card">
                    <span class="link-content">
                        <i data-lucide="twitter"></i>
                        <span>Twitter</span>
                    </span>
                    <i data-lucide="external-link" class="external-link"></i>
                </a>

                <!-- Instagram link -->
                <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="link-card">
                    <span class="link-content">
                        <i data-lucide="instagram"></i>
                        <span>Instagram</span>
                    </span>
                    <i data-lucide="external-link" class="external-link"></i>
                </a>
            </div>
        </div>

        <!-- Footer section -->
        <footer>
            ♡ made with love
        </footer>
    </div>

    <!-- Initialize Lucide icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
